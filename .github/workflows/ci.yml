name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-cov

      - name: Test with pytest
        run: |
          pytest --cov=src --cov-report=xml

      - name: Smoke test MCP server startup
        run: |
          ./scripts/smoke.sh

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect Go files
        id: detect
        run: |
          if find . -name "*.go" -not -path "./.git/*" | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Lint Go sources with gofmt
        if: steps.detect.outputs.has_go == 'true'
        run: |
          files=$(find . -name "*.go" -not -path "./.git/*")
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi

      - name: Skip (no Go files)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No Go files found; skipping Go lint."

  go-build:
    name: Go Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect Go files
        id: detect
        run: |
          if find . -name "*.go" -not -path "./.git/*" | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build Go sources
        if: steps.detect.outputs.has_go == 'true'
        run: |
          if [ ! -f go.mod ]; then
            echo "Go files found but no go.mod; skipping Go build."
            exit 0
          fi
          go build ./...

      - name: Skip (no Go files)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No Go files found; skipping Go build."
